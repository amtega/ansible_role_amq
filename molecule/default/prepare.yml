---
- name: Prepare testing hosts
  hosts: molecule_hosts
  gather_facts: false
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
  tasks:
    - name: Setup python
      ansible.builtin.raw: yum install -y python39
      changed_when: false
      when: true

    - name: Gather facts
      ansible.builtin.setup:

- name: Prepare nfs server
  hosts: molecule_hosts_nfs_servers
  become: true
  tasks:
    - name: Molecule requirements for this scenario
      ansible.builtin.include_tasks: tasks/scenario_requirements.yml
    - name: Setup packages
      ansible.builtin.yum: # noqa fqcn[action-core]
        state: present
        name:
          - nfs-utils
          - rpcbind

    - name: Setup /etc/exports
      ansible.builtin.lineinfile:
        path: /etc/exports
        line: "{{ test_nfs_directory }} *(rw,sync,no_root_squash,no_all_squash)"
        create: true
        mode: "0644"
        unsafe_writes: true

    - name: Setup nfs shared directory
      ansible.builtin.file:
        path: "{{ test_nfs_directory }}"
        state: directory
        mode: "755"
        owner: nobody
        group: nobody

    - name: Start and enable service
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - rpcbind
        - nfs-server

    - name: Setup nfs-server service
      ansible.builtin.systemd:
        name: nfs-server
        state: restarted
  vars:
    ansible_python_interpreter: /usr/bin/python3

- name: Prepare amq cluster hosts
  hosts: molecule_hosts_amq_cluster
  become: true
  tasks:
    - name: Setup packages
      ansible.builtin.yum: # noqa fqcn[action-core]
        state: present
        name:
          - "{{ test_java_package }}"
          - nfs-utils

    - name: Ensure group exist {{ amq_group }}
      ansible.builtin.group:
        name: "{{ amq_group }}"
        state: present

    - name: Ensure user exists {{ amq_user }}
      ansible.builtin.user:
        name: "{{ amq_user }}"
        group: "{{ amq_group }}"

    - name: Ad amq cluster nodes to /etc/hosts
      loop: "{{ groups['molecule_hosts_amq_cluster'] }}"
      loop_control:
        loop_var: amq_hostname
      vars:
        amq_hostvars: >-
          {{ hostvars[amq_hostname] }}
        amq_ip: >-
          {{ amq_hostvars.ansible_eth1.ipv4.address }}
        amq_fqdn: >-
          {{ amq_hostvars.ansible_facts.fqdn }}
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: ^{{ amq_ip }}
        line: "{{ amq_ip }} {{ amq_fqdn }}"
        owner: root
        group: root
        mode: "0644"
        unsafe_writes: true

    - name: Clean amq if installed
      ansible.builtin.import_tasks: tasks/clean.yml
    - name: Setup data directory
      ansible.builtin.file:
        path: "{{ amq_broker_data_dir }}"
        owner: "{{ amq_user }}"
        group: "{{ amq_group }}"
        mode: u=rwx,g=rwx,o=
        state: directory
        recurse: true

    - name: Setup nfs-mountd service
      ansible.builtin.service:
        name: nfs-mountd
        state: started
        enabled: true

    - name: Mount shared nfs directory
      ansible.posix.mount:
        path: "{{ amq_broker_data_dir }}"
        src: "{{ test_nfs_share }}"
        fstype: nfs
        opts: rw
        state: mounted
  vars:
    ansible_python_interpreter: /usr/bin/python3
