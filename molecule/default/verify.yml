---
- name: Verify
  hosts: molecule_hosts
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
  tasks:
    - name: Molecule requirements for this scenario
      ansible.builtin.include_tasks: tasks/scenario_requirements.yml
- name: Get historic
  hosts: molecule_hosts_amq_cluster
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
  tasks:
    - name: Save created VM files
      when: test_save_files
      ansible.builtin.include_tasks: tasks/verify_save_files.yml
    - name: Verify xml
      ansible.builtin.include_tasks: tasks/verify_xml.yml
