---
- name: Download amq
  tags:
    - role::amq::install
    - role::amq::install::download
  block:
    - name: Setup install directory
      ansible.builtin.file:
        path: "{{ amq_install_dir | dirname }}"
        state: directory
        owner: "{{ amq_user }}"
        group: "{{ amq_group }}"
        mode: u=rwx,g=rwx,o=rx

    - name: Download amq artifact
      ansible.builtin.include_tasks: artifact.yml
